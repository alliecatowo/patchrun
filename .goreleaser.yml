version: 2

project_name: patchrun

before:
  hooks:
    - go mod tidy

builds:
  - id: patchrun
    main: ./cmd/patchrun
    binary: patchrun
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: patchrun
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: alliecatowo
    name: patchrun
  draft: false
  prerelease: auto
  name_template: "patchrun {{ .Tag }}"
  header: |
    `patchrun` — run any command as a patch before it touches your repo.

    Install:
    ```bash
    go install github.com/alliecatowo/patchrun/cmd/patchrun@{{ .Tag }}
    ```
